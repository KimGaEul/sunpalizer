<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunpalizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f13;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 28px 16px;
}
.container { max-width: 820px; margin: 0 auto; }
h1 { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
.subtitle { font-size: 0.82rem; color: #666; margin-bottom: 24px; }





.card {
  background: #1a1a22;
  border: 1px solid #2a2a38;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 14px;
}
.card-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: #8888bb;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-label span.tip {
  font-weight: 400;
  font-size: 0.72rem;
  color: #444;
  text-transform: none;
  letter-spacing: 0;
}
textarea {
  width: 100%;
  background: #13131a;
  border: 1px solid #2a2a38;
  border-radius: 10px;
  color: #e0e0e0;
  font-size: 0.88rem;
  line-height: 1.65;
  padding: 12px 14px;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
}
textarea:focus { border-color: #5555bb; }
textarea::placeholder { color: #3a3a4a; }
.analysis-box {
  background: #13131a;
  border: 1px solid #2d2d45;
  border-radius: 10px;
  padding: 14px;
  font-size: 0.82rem;
  line-height: 1.7;
  color: #aaaadd;
  white-space: pre-wrap;
  word-break: break-word;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.slider-label { font-size: 0.78rem; color: #888; min-width: 100px; }
input[type=range] { flex: 1; accent-color: #6655cc; height: 4px; }
.slider-val { font-size: 0.78rem; color: #aaaadd; min-width: 24px; text-align: right; }
.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  font-size: 0.82rem;
  color: #888;
}
.toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: #2a2a38;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  left: 3px; top: 3px;
  background: #555;
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.toggle input:checked + .toggle-slider { background: #4444aa; }
.toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #aaaaff; }
.btn-row { display: flex; gap: 10px; margin-bottom: 14px; }
.analyze-btn, .convert-btn {
  flex: 1;
  border: none;
  border-radius: 11px;
  font-size: 0.9rem;
  font-weight: 600;
  padding: 12px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.analyze-btn {
  background: #2a2a40;
  color: #9999cc;
  border: 1px solid #3a3a55;
  flex: 0 0 auto;
  padding: 12px 18px;
}
.analyze-btn:hover { background: #333350; }
.convert-btn { background: linear-gradient(135deg, #4444aa, #6655cc); color: #fff; }
.convert-btn:hover { opacity: 0.88; }
.convert-btn:active, .analyze-btn:active { transform: scale(0.99); }
.convert-btn:disabled, .analyze-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.output-label {
  font-size: 0.72rem; font-weight: 700; color: #8888bb;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.badge {
  background: #2a2a3a; color: #6666aa;
  border-radius: 20px; padding: 2px 8px; font-size: 0.68rem;
}
.badge.done { background: #1a2a1a; color: #55aa55; }
.badge.loading { background: #1a1a2a; color: #5555aa; }
.badge.error { background: #2a1a1a; color: #aa5555; }
.output-area {
  background: #13131a;
  border: 1px solid #2a2a38;
  border-radius: 10px;
  padding: 14px;
  min-height: 100px;
  font-size: 0.9rem;
  line-height: 1.75;
  color: #e0e0e0;
  white-space: pre-wrap;
  word-break: break-word;
}
.output-area.empty { color: #333; font-style: italic; }
.copy-btn {
  margin-top: 8px;
  background: #2a2a38; border: none; border-radius: 7px;
  color: #888; font-size: 0.78rem; padding: 5px 12px; cursor: pointer;
}
.copy-btn:hover { background: #3a3a55; color: #fff; }
.loading-dots span { animation: blink 1.2s infinite; color: #6666cc; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0.15; } 40% { opacity: 1; } }
.preset-btn {
  background: #1e1e2e; border: 1px solid #333355;
  border-radius: 7px; color: #7777cc; font-size: 0.75rem;
  padding: 4px 10px; cursor: pointer; margin-bottom: 8px; display: inline-block;
}
.preset-btn:hover { background: #2a2a45; color: #aaaaff; }
.step-indicator {
  display: flex; gap: 6px; align-items: center;
  font-size: 0.75rem; color: #444; margin-bottom: 10px;
}
.step { padding: 3px 10px; border-radius: 20px; background: #1e1e28; color: #555; font-size: 0.72rem; }
.step.active { background: #2d2d50; color: #9999dd; }
.step.done { background: #1e281e; color: #559955; }
.step-arrow { color: #333; }
</style>
</head>
<body>



<div class="container">
  <h1>✍️ Sunpalizer</h1>
  <p class="subtitle">선팔님 말투로 변환해드립니다 -0-;;</p>

  <div class="step-indicator">
    <div class="step active" id="step1">① 예시 입력</div>
    <span class="step-arrow">›</span>
    <div class="step" id="step2">② 말투 분석</div>
    <span class="step-arrow">›</span>
    <div class="step" id="step3">③ 텍스트 변환</div>
  </div>

  <div class="card">
    <div class="card-label">
      📝 말투 예시
      <span class="tip">많을수록 정확해요 (10개+ 권장)</span>
    </div>
    <button class="preset-btn" onclick="loadPreset()">📎 선팔님 예시 불러오기</button>
    <textarea id="samples" rows="8" placeholder="그 사람이 실제로 쓴 문장들을 붙여넣으세요."></textarea>
  </div>

  <div class="card" id="analysis-card" style="display:none">
    <div class="card-label">🧠 말투 분석 결과</div>
    <div class="analysis-box" id="analysis-output"></div>
  </div>

  <div class="card">
    <div class="card-label">⚙️ 변환 설정</div>
    <div class="slider-row">
      <span class="slider-label">사족/TMI 강도</span>
      <input type="range" min="0" max="3" value="2" id="tmi-level" oninput="updateSlider(this,'tmi-val')">
      <span class="slider-val" id="tmi-val">2</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">ㄴ 답글 추가</span>
      <input type="range" min="0" max="2" value="1" id="reply-level" oninput="updateSlider(this,'reply-val')">
      <span class="slider-val" id="reply-val">1</span>
    </div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="toggle-emoji" checked><div class="toggle-slider"></div></label>
      <span>특이 이모티콘 사용 <span style="color:#555;font-size:0.75rem">(-0- ;; =ㅂ= 류)</span></span>
    </div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="toggle-semico" checked><div class="toggle-slider"></div></label>
      <span>세미콜론/말줄임 사용 <span style="color:#555;font-size:0.75rem">(;; ... ㅋ 류)</span></span>
    </div>
  </div>

  <div class="card">
    <div class="card-label">💬 변환할 텍스트</div>
    <textarea id="input-text" rows="4" placeholder="변환하고 싶은 문장을 입력하세요."></textarea>
  </div>

  <div class="btn-row">
    <button class="analyze-btn" id="analyze-btn" onclick="analyze()">🔍 말투 분석</button>
    <button class="convert-btn" id="convert-btn" onclick="convert()">🔁 말투 변환하기</button>
  </div>

  <div class="card">
    <div class="output-label">
      ✨ 변환 결과
      <span class="badge" id="status-badge">대기중</span>
    </div>
    <div class="output-area empty" id="output">결과가 여기에 나타납니다.</div>
    <button class="copy-btn" id="copy-btn" style="display:none" onclick="copyOutput()">📋 복사</button>
  </div>
</div>

<script>
const PRESET = `바꿔말해버렸네요;;; 낄-0-;;
ㄴ 그럴때는 모바일에선 좀 무겁고 pc에선 좀 가벼운게임이랑 같이돌리면 잘될수도있있죠;;
ㄴ놀랍게도 게임들에 기본적으로 메모리최적화프로세스가 드가서 -0-ㅋㅋㅋㅋㅋ
딱 하나만 주의해서 걸르고 보면 괜찮은 책 (이거 하나로 별점이 폭삭하지만)
잊을만하면 내용 중간중간마다 ㅇㄷ권 주입 시켜서요 -_-;; 
특이하다기보단 걍 악필 -ㅠ-...
몇번씩 여기서 제가 간혹 얘기한 적도 있는거 같은데,
그래서 트로트에 대해서는 공격하는 언급 보이면 디게 조심하는 이유도 이런 역사에 기인합니다;;뭐였나 싶어 잠깐 들어보고 온 길입니다
ㄴ 하드코어 게열들이면 이런 보컬들 투성이잖아요 =ㅂ= ㅋ
무능력한 월급루팡 따위이나, 그저 조용하고 사고 안치니 붙어있다 
ㄴ 그러니 진상이지근데 결코 못이깁니다
ㄴ 개기면 자르거든어제 debaser 선정으로, 한국에서 시끄러운 밴드 19선인가 중에 하나로 보이더군요
ㄴ 디베이저 공식 인스타에서 확인됨 ㅋ`;

let analysisResult = '';

function loadPreset() { document.getElementById('samples').value = PRESET; }
function updateSlider(el, id) { document.getElementById(id).textContent = el.value; }

function setStep(n) {
  [1,2,3].forEach(i => {
    const el = document.getElementById('step'+i);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  });
}
function setBadge(text, cls) {
  const b = document.getElementById('status-badge');
  b.textContent = text;
  b.className = 'badge' + (cls ? ' '+cls : '');
}

async function callApi(system, userMsg) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system, userMsg })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.result || '';
}

async function analyze() {
  const samples = document.getElementById('samples').value.trim();
  if (!samples) { alert('말투 예시를 먼저 입력해주세요!'); return; }
  const btn = document.getElementById('analyze-btn');
  const card = document.getElementById('analysis-card');
  const out = document.getElementById('analysis-output');
  btn.disabled = true;
  card.style.display = 'block';
  out.innerHTML = '<div class="loading-dots"><span>●</span><span>●</span><span>●</span></div>';
  setStep(2);
  try {
    analysisResult = await callApi(
      `너는 언어학자야. 주어진 말투 예시를 분석해서 핵심 특징을 한국어로 정리해줘.
1. 이모티콘/기호 패턴
2. 문장 끝맺음 특징
3. TMI/사족 추가 방식
4. ㄴ 답글 구조
5. 어휘/줄임말 특징
6. 리듬감/호흡
7. 전반적인 성격
각 항목은 짧게, 예시와 함께 써줘.`,
      `분석해줘:\n\n${samples}`
    );
    out.textContent = analysisResult;
    setStep(3);
  } catch(e) {
    out.textContent = '분석 실패: ' + e.message;
  } finally { btn.disabled = false; }
}

function buildSystemPrompt(samples) {
  const tmi = parseInt(document.getElementById('tmi-level').value);
  const reply = parseInt(document.getElementById('reply-level').value);
  const emoji = document.getElementById('toggle-emoji').checked;
  const semico = document.getElementById('toggle-semico').checked;
  const tmiDesc = ['사족 없이 핵심만','가끔 짧은 TMI 추가','TMI/부연설명을 꽤 자주 덧붙임','TMI 투성이, 본론보다 사족이 더 길어도 됨'][tmi];
  const replyDesc = ['ㄴ 답글 없음','ㄴ 답글 1개 정도 추가 가능','ㄴ 답글로 계속 이어 말하기'][reply];
  let constraints = '';
  if (!emoji) constraints += '\n- 특이 이모티콘(-0-, =ㅂ= 등)은 쓰지 마';
  if (!semico) constraints += '\n- ;; ... ㅋ 같은 기호 최소화해';
  const analysisSection = analysisResult ? `\n\n【말투 분석 결과】\n${analysisResult}` : '';
  return `너는 말투 변환 전문가야.\n\n【말투 예시】\n${samples}${analysisSection}\n\n【변환 설정】\n- TMI/사족: ${tmiDesc}\n- ㄴ 답글: ${replyDesc}${constraints}\n\n규칙:\n- 원문의 핵심 의미는 반드시 유지해\n- 이 사람 특유의 호흡, 리듬, 어미를 살려\n- 설명 없이 변환 결과만 출력해`;
}

async function convert() {
  const samples = document.getElementById('samples').value.trim();
  const inputText = document.getElementById('input-text').value.trim();
  if (!samples) { alert('말투 예시를 먼저 입력해주세요!'); return; }
  if (!inputText) { alert('변환할 텍스트를 입력해주세요!'); return; }
  const btn = document.getElementById('convert-btn');
  const output = document.getElementById('output');
  const copyBtn = document.getElementById('copy-btn');
  btn.disabled = true;
  setBadge('변환중...', 'loading');
  output.className = 'output-area';
  output.innerHTML = '<div class="loading-dots"><span>●</span><span>●</span><span>●</span></div>';
  copyBtn.style.display = 'none';
  try {
    const result = await callApi(buildSystemPrompt(samples), inputText);
    output.className = 'output-area';
    output.textContent = result;
    setBadge('완료 ✓', 'done');
    copyBtn.style.display = '';
  } catch(e) {
    output.className = 'output-area empty';
    output.textContent = '오류: ' + e.message;
    setBadge('오류', 'error');
  } finally { btn.disabled = false; }
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ 복사됨';
    setTimeout(() => btn.textContent = '📋 복사', 1500);
  });
}
</script>
</body>
</html>
